services:
  - type: web
    name: aspenoptions
    env: python
    pythonVersion: "3.11"
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn profitLynx.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: aspenoptions-db
          property: connectionString

databases:
  - name: aspenoptions-db
    plan: free
