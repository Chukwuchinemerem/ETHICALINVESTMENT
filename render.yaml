services:
  - type: web
    name: aspenoptions
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn profitLynx.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: aspenoptions-db
          property: connectionString

databases:
  - name: aspenoptions-db
    plan: free
